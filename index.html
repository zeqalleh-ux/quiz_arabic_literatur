<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كويز — الأدب في مصر</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --dark: #1a1208;
    --dark2: #2a1e0a;
    --cream: #f5edd8;
    --cream2: #ede0c4;
    --red: #8b2e2e;
    --green: #2e6b3e;
    --blue: #1e3a6b;
    --shadow: 0 4px 24px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--dark);
    color: var(--cream);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.05) 0%, transparent 60%),
      repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(201,168,76,0.015) 40px, rgba(201,168,76,0.015) 41px);
  }

  header {
    text-align: center;
    padding: 3rem 1rem 2rem;
    border-bottom: 2px solid var(--gold);
    background: linear-gradient(180deg, rgba(201,168,76,0.12) 0%, transparent 100%);
    position: relative;
  }

  header::before {
    content: '☽ ✦ ☾';
    display: block;
    color: var(--gold);
    font-size: 1.4rem;
    letter-spacing: 1rem;
    margin-bottom: 0.8rem;
    opacity: 0.7;
  }

  header h1 {
    font-family: 'Amiri', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--gold-light);
    text-shadow: 0 2px 12px rgba(201,168,76,0.4);
    line-height: 1.4;
  }

  header p {
    color: var(--cream2);
    margin-top: 0.5rem;
    font-size: 1rem;
    opacity: 0.8;
  }

  .quiz-container {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1rem 4rem;
  }

  /* SECTION HEADER */
  .section-title {
    font-family: 'Amiri', serif;
    font-size: 1.5rem;
    color: var(--gold);
    text-align: center;
    margin: 2.5rem 0 1.5rem;
    padding: 0.6rem 2rem;
    border-top: 1px solid rgba(201,168,76,0.4);
    border-bottom: 1px solid rgba(201,168,76,0.4);
    position: relative;
  }

  .section-title::before,
  .section-title::after {
    content: '◆';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-size: 0.7rem;
    opacity: 0.6;
  }
  .section-title::before { right: 0.5rem; }
  .section-title::after { left: 0.5rem; }

  .subsection-title {
    font-size: 1.1rem;
    color: var(--gold-light);
    margin: 2rem 0 1rem;
    padding-right: 1rem;
    border-right: 3px solid var(--gold);
    font-weight: 700;
  }

  /* QUESTION CARD */
  .question-card {
    background: linear-gradient(135deg, rgba(42,30,10,0.95) 0%, rgba(26,18,8,0.98) 100%);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.2rem;
    box-shadow: var(--shadow);
    transition: border-color 0.3s;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 4px;
    height: 100%;
    background: linear-gradient(180deg, var(--gold), transparent);
    opacity: 0.5;
  }

  .question-card.answered { border-color: rgba(201,168,76,0.5); }

  .question-num {
    font-size: 0.75rem;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 0.5rem;
    letter-spacing: 0.05em;
  }

  .question-text {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--cream);
    margin-bottom: 1.2rem;
    line-height: 1.7;
  }

  /* OPTIONS — MCQ */
  .options {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .option-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 8px;
    padding: 0.7rem 1.1rem;
    color: var(--cream2);
    font-family: 'Cairo', sans-serif;
    font-size: 0.97rem;
    cursor: pointer;
    text-align: right;
    transition: all 0.22s ease;
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .option-btn:hover:not(:disabled) {
    background: rgba(201,168,76,0.12);
    border-color: var(--gold);
    color: var(--cream);
    transform: translateX(-3px);
  }

  .option-btn .opt-label {
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px;
    padding: 0.1rem 0.5rem;
    font-size: 0.8rem;
    color: var(--gold);
    min-width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .option-btn.correct {
    background: rgba(46,107,62,0.3);
    border-color: #4caf50;
    color: #a5d6a7;
  }
  .option-btn.correct .opt-label { background: rgba(76,175,80,0.3); border-color: #4caf50; color: #a5d6a7; }

  .option-btn.wrong {
    background: rgba(139,46,46,0.3);
    border-color: #ef5350;
    color: #ef9a9a;
  }
  .option-btn.wrong .opt-label { background: rgba(239,83,80,0.3); border-color: #ef5350; color: #ef9a9a; }

  .option-btn:disabled { cursor: default; }

  /* FEEDBACK */
  .feedback {
    margin-top: 0.8rem;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { color: #81c784; background: rgba(46,107,62,0.15); }
  .feedback.wrong-fb { color: #e57373; background: rgba(139,46,46,0.15); }

  /* TRUE/FALSE */
  .tf-options {
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
  }

  .tf-btn {
    flex: 1;
    min-width: 100px;
    padding: 0.7rem 1.2rem;
    border-radius: 8px;
    border: 1px solid rgba(201,168,76,0.25);
    background: rgba(255,255,255,0.04);
    color: var(--cream2);
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.22s;
    text-align: center;
  }

  .tf-btn:hover:not(:disabled) {
    background: rgba(201,168,76,0.12);
    border-color: var(--gold);
    color: var(--cream);
  }

  .tf-btn.correct {
    background: rgba(46,107,62,0.3);
    border-color: #4caf50;
    color: #a5d6a7;
  }
  .tf-btn.wrong {
    background: rgba(139,46,46,0.3);
    border-color: #ef5350;
    color: #ef9a9a;
  }
  .tf-btn:disabled { cursor: default; }

  /* SCORE BAR */
  .score-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(26,18,8,0.97);
    border-bottom: 1px solid rgba(201,168,76,0.3);
    padding: 0.8rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(10px);
    gap: 1rem;
    flex-wrap: wrap;
  }

  .score-label {
    font-size: 0.9rem;
    color: var(--gold);
    font-weight: 700;
  }

  .score-progress {
    flex: 1;
    max-width: 300px;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }

  .score-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .score-count {
    font-size: 1rem;
    font-weight: 900;
    color: var(--gold-light);
    white-space: nowrap;
  }

  /* RESET */
  .reset-btn {
    display: block;
    margin: 3rem auto 1rem;
    padding: 0.9rem 3rem;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--dark);
    font-family: 'Cairo', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(201,168,76,0.35);
    transition: all 0.25s;
  }
  .reset-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(201,168,76,0.5);
  }

  /* FINAL RESULT */
  .final-result {
    display: none;
    text-align: center;
    padding: 2rem;
    background: linear-gradient(135deg, rgba(201,168,76,0.1), rgba(42,30,10,0.9));
    border: 1px solid var(--gold);
    border-radius: 16px;
    margin-top: 2rem;
  }
  .final-result.show { display: block; }
  .final-result h2 { font-family: 'Amiri', serif; font-size: 2rem; color: var(--gold-light); margin-bottom: 0.5rem; }
  .final-result p { color: var(--cream2); font-size: 1.1rem; }
  .final-score { font-size: 3rem; font-weight: 900; color: var(--gold); margin: 1rem 0; }

  @media (max-width: 600px) {
    .question-text { font-size: 0.97rem; }
    .option-btn { font-size: 0.9rem; padding: 0.6rem 0.9rem; }
  }
</style>
</head>

// State
let answered = {};
let correct = 0;
let total = 0;

function updateScore() {
  const fill = document.getElementById('scoreFill');
  const count = document.getElementById('scoreCount');
  const pct = total > 0 ? (correct / total) * 100 : 0;
  fill.style.width = pct + '%';
  count.textContent = correct + ' / ' + total;
}

function getLabels(i) {
  return ['أ', 'ب', 'ج', 'د'][i] || String.fromCharCode(1575 + i);
}

function buildMCQ() {
  let sections = {};
  mcqData.forEach((item, idx) => {
    if (!sections[item.section]) sections[item.section] = [];
    sections[item.section].push({ ...item, idx });
  });

  let html = `<div class="section-title">اختيار من متعدد</div>`;

  Object.entries(sections).forEach(([sec, qs]) => {
    html += `<div class="subsection-title">${sec}</div>`;
    qs.forEach(({ q, opts, ans, idx }) => {
      const id = 'mcq_' + idx;
      html += `<div class="question-card" id="card_${id}">
        <div class="question-num">سؤال ${idx + 1}</div>
        <div class="question-text">${q}</div>
        <div class="options" id="opts_${id}">`;
      opts.forEach((opt, oi) => {
        html += `<button class="option-btn" onclick="answerMCQ('${id}',${oi},${ans})" id="${id}_opt${oi}">
          <span class="opt-label">${getLabels(oi)}</span>
          ${opt}
        </button>`;
      });
      html += `</div>
        <div class="feedback" id="fb_${id}"></div>
      </div>`;
      total++;
    });
  });
  return html;
}

function buildTF() {
  let html = '';
  let tfIdx = 0;
  tfSections.forEach((sec, si) => {
    html += `<div class="section-title">${sec.title}</div>`;
    sec.questions.forEach((item, qi) => {
      const id = `tf_${si}_${qi}`;
      html += `<div class="question-card" id="card_${id}">
        <div class="question-num">سؤال ${qi + 1}</div>
        <div class="question-text">${item.q}</div>
        <div class="tf-options">
          <button class="tf-btn" onclick="answerTF('${id}',true,${item.ans})" id="${id}_t">✅ صواب</button>
          <button class="tf-btn" onclick="answerTF('${id}',false,${item.ans})" id="${id}_f">❌ خطأ</button>
        </div>
        <div class="feedback" id="fb_${id}"></div>
      </div>`;
      total++;
    });
  });
  return html;
}

function answerMCQ(id, chosen, correct_idx) {
  if (answered[id]) return;
  answered[id] = true;

  const opts = document.querySelectorAll(`#opts_${id} .option-btn`);
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct_idx) btn.classList.add('correct');
    else if (i === chosen) btn.classList.add('wrong');
  });

  const fb = document.getElementById('fb_' + id);
  fb.classList.add('show');
  if (chosen === correct_idx) {
    correct++;
    fb.textContent = '✅ إجابة صحيحة!';
    fb.className = 'feedback show correct-fb';
  } else {
    fb.textContent = '❌ إجابة خاطئة. الإجابة الصحيحة: ' + ['أ','ب','ج','د'][correct_idx];
    fb.className = 'feedback show wrong-fb';
  }
  document.getElementById('card_' + id).classList.add('answered');
  updateScore();
  checkAll();
}

function answerTF(id, chosen, correct_ans) {
  if (answered[id]) return;
  answered[id] = true;

  const tBtn = document.getElementById(id + '_t');
  const fBtn = document.getElementById(id + '_f');
  tBtn.disabled = true;
  fBtn.disabled = true;

  const isCorrect = (chosen === correct_ans);
  if (correct_ans === true) { tBtn.classList.add('correct'); if (!isCorrect) fBtn.classList.add('wrong'); }
  else { fBtn.classList.add('correct'); if (!isCorrect) tBtn.classList.add('wrong'); }

  const fb = document.getElementById('fb_' + id);
  fb.classList.add('show');
  if (isCorrect) {
    correct++;
    fb.textContent = '✅ إجابة صحيحة!';
    fb.className = 'feedback show correct-fb';
  } else {
    fb.textContent = '❌ إجابة خاطئة. الإجابة الصحيحة: ' + (correct_ans ? 'صواب' : 'خطأ');
    fb.className = 'feedback show wrong-fb';
  }
  document.getElementById('card_' + id).classList.add('answered');
  updateScore();
  checkAll();
}

function checkAll() {
  if (Object.keys(answered).length === total) {
    document.getElementById('finalResult').classList.add('show');
    const pct = Math.round((correct / total) * 100);
    document.getElementById('finalScore').textContent = correct + ' / ' + total;
    let msg = '';
    if (pct >= 90) msg = '🏆 ممتاز! أداء رائع جدًا!';
    else if (pct >= 75) msg = '👏 جيد جدًا! استمر في المذاكرة!';
    else if (pct >= 60) msg = '👍 جيد! لكن يمكنك تحسين نتيجتك!';
    else msg = '📚 راجع المادة وحاول مرة أخرى!';
    document.getElementById('finalMsg').textContent = msg + ' (' + pct + '%)';
  }
}

function resetQuiz() {
  answered = {};
  correct = 0;
  updateScore();
  document.getElementById('finalResult').classList.remove('show');
  buildQuiz();
}

function buildQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = buildMCQ() + buildTF() + `
    <div class="final-result" id="finalResult">
      <h2>انتهى الكويز!</h2>
      <div class="final-score" id="finalScore">0/0</div>
      <p id="finalMsg"></p>
    </div>
    <button class="reset-btn" onclick="resetQuiz()">🔄 إعادة المحاولة</button>
  `;
}

buildQuiz();
updateScore();
